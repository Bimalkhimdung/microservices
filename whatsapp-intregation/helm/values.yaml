# ──────────────────────────────────────────────────────────────────────────────
# Default Helm values for whatsapp-intregation
# Override with values/dev.yaml or values/prod.yaml
# ──────────────────────────────────────────────────────────────────────────────

replicaCount: 1  # MUST be 1 — WhatsApp Web session is single-socket

image:
  repository: whatsapp-intregation
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ── Service ──────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 3000

# ── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: whatsapp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: whatsapp-tls
  #   hosts:
  #     - whatsapp.example.com

# ── Environment ───────────────────────────────────────────────────────────────
env:
  PORT: "3000"
  AUTH_DIR: "/data/wa-auth"
  LOG_LEVEL: "info"
  NODE_ENV: "production"

# ── Secret ────────────────────────────────────────────────────────────────────
secret:
  # Set this in values/prod.yaml or via --set secret.apiKey=...
  # NEVER commit the actual key to git
  apiKey: "change-me-strong-secret-key"

# ── Persistent Volume Claim ───────────────────────────────────────────────────
persistence:
  enabled: true
  storageClass: ""          # leave empty to use cluster default
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /data/wa-auth

# ── Resources ────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ── Probes ────────────────────────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 5

# ── Security ─────────────────────────────────────────────────────────────────
podSecurityContext:
  fsGroup: 1001
  runAsNonRoot: true

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false   # Baileys needs to write to auth dir
  runAsNonRoot: true
  runAsUser: 1001
  capabilities:
    drop:
      - ALL

# ── Misc ──────────────────────────────────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}

terminationGracePeriodSeconds: 30

podAnnotations:
  prometheus.io/scrape: "false"

serviceAccount:
  create: false
  name: ""
