version: "3.9"
services:
  telegram-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: telegram-intregation:local
    container_name: telegram-intregation
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      API_KEY: ${API_KEY:-change-me-strong-secret}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BOT_MODE: ${BOT_MODE:-polling}
      NODE_ENV: ${NODE_ENV:-development}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
